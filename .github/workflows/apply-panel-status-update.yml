name: Apply panel layout status update

on:
  push:
    branches:
      - agent/fix-compact-lyrics
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  update-status:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-compact-lyrics
          fetch-depth: 0

      - name: Update implementation status files
        shell: python
        run: |
          from pathlib import Path
          import re

          agents_path = Path('AGENTS.md')
          agents = agents_path.read_text(encoding='utf-8')

          checkpoint_pattern = re.compile(
              r"## Persistent checkpoint\n\n> \*\*The agent must update this section.*?\n\n"
              r"(?:- \*\*.*?\n)+",
              re.S,
          )
          checkpoint = '''## Persistent checkpoint

> **The agent must update this section whenever work starts, a task is completed, a blocker is discovered, validation changes, or a phase ends.**

- **Current phase:** Phase 6 — Integration hardening
- **Phase status:** `in_progress`
- **Current task:** 6.1 — Execute and document the full end-to-end scenario matrix; current subtask is 6.8 horizontal-panel lyric validation
- **Recommended model:** GPT-5.6 Sol
- **Reasoning:** High
- **Last completed task:** 6.11 — Update compatibility and manual-test documentation; panel sizing implementation and layout documentation are committed in draft PR #1
- **Last verified commit:** `9281dc1` — docs(plasmoid): document taskbar lyric layout
- **Open pull request:** Draft PR #1 — `fix(plasmoid): show lyric text in horizontal panels` on `agent/fix-compact-lyrics`
- **Last validation:** Previous Phase 6 checks passed on 2026-07-11. The panel-sizing patch has received static review, but branch-wide automated checks and real horizontal-panel validation remain pending.
- **Known blockers:** Cider 3.1.8 exposes lyrics only while its Lyrics view is open. Real horizontal-panel validation of PR #1, suspend/resume, Plasma-session restart, real vertical-panel, Breeze Light, and font-extreme checks require interaction with the active Plasma session. `plasmoidviewer` is unavailable.
- **Next exact action:** Validate draft PR #1 in a real horizontal Plasma panel using `docs/plasma-panel-layout.md`, record the result in the Phase 6 matrix, then resume the remaining task 6.1 scenarios.
- **Last updated:** 2026-07-11 — Added the horizontal-panel sizing fix, taskbar layout contract, draft PR #1, and the pending real-panel validation checkpoint.
'''
          agents, count = checkpoint_pattern.subn(checkpoint, agents, count=1)
          if count != 1:
              raise SystemExit('Could not replace AGENTS.md persistent checkpoint')

          task_line = '- [ ] **6.8** Test themes, panel orientations, font scaling, DPI scaling, RTL, and long lines.'
          replacement = task_line + ' Panel sizing fix is implemented in draft PR #1; real horizontal-panel validation remains pending.'
          if task_line not in agents:
              raise SystemExit('Could not find AGENTS.md task 6.8')
          agents = agents.replace(task_line, replacement, 1)
          agents_path.write_text(agents, encoding='utf-8')

          status_path = Path('docs/phase-status.md')
          status = status_path.read_text(encoding='utf-8')
          journal = '''

### Phase 6 horizontal-panel lyric layout checkpoint

Draft PR #1 on branch `agent/fix-compact-lyrics` addresses an integration defect discovered during task 6.8. The compact Plasma representation was intended to show the active lyric directly in a horizontal taskbar, but a real panel could collapse it to icon-only width because the root relied on `implicitWidth`, the child `Row` filled that root, and the lyric label width depended on the width assigned to the same row.

Commit `46b09da` replaces the circular sizing arrangement with explicit Qt Quick `Layout.minimumWidth`, `Layout.preferredWidth`, and `Layout.maximumWidth` hints, uses `RowLayout`, and gives the lyric label `Layout.fillWidth: true` with `Layout.minimumWidth: 0`. Complete lyric text remains in protocol state, while the taskbar uses a stable configured pixel viewport and right-side elision. Commit `9281dc1` adds `docs/plasma-panel-layout.md` with the design contract, character-count policy, regression criteria, and real-panel validation procedure.

Static review is complete. This does not complete task 6.8 or Phase 6. The patch still requires branch-wide checks and validation in an actual horizontal Plasma panel. The next exact action is to install the branch plasmoid, verify fallback and live lyric text directly in the taskbar, test short and long lines, icon visibility, width settings, tooltip and popup behavior, and record the Plasma version, orientation, scaling, theme, configured widths, and result in the integration matrix. After that targeted check, resume the remaining task 6.1 scenario rows.
'''
          if '### Phase 6 horizontal-panel lyric layout checkpoint' not in status:
              status = status.rstrip() + journal + '\n'
          status_path.write_text(status, encoding='utf-8')

          plan_path = Path('KLYRIC_IMPLEMENTATION_PLAN.md')
          plan = plan_path.read_text(encoding='utf-8')
          anchor = '- support horizontal and vertical panels.\n'
          addition = anchor + '\nThe detailed compact-panel sizing contract, long-line policy, and real-panel validation procedure are maintained in `docs/plasma-panel-layout.md`.\n'
          if 'docs/plasma-panel-layout.md' not in plan:
              if anchor not in plan:
                  raise SystemExit('Could not find compact representation anchor in plan')
              plan = plan.replace(anchor, addition, 1)
          plan_path.write_text(plan, encoding='utf-8')

          Path('.github/workflows/apply-panel-status-update.yml').unlink()

      - name: Commit documentation updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENTS.md docs/phase-status.md KLYRIC_IMPLEMENTATION_PLAN.md .github/workflows/apply-panel-status-update.yml
          git commit -m "docs(phase): track horizontal panel validation"
          git push origin HEAD:agent/fix-compact-lyrics
